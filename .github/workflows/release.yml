name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build app
        run: |
          pyinstaller --onefile --windowed \
            --name "Tricky Towers Controller Patch" \
            --add-data "patch.py:." \
            patch_gui.py

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Tricky Towers Controller Patch" \
            --window-size 300 200 \
            --icon-size 100 \
            --icon "Tricky Towers Controller Patch.app" 150 100 \
            "TrickyTowersPatch.dmg" \
            "dist/Tricky Towers Controller Patch.app"

      - name: Create ZIP
        run: |
          cp release-files/INSTALL.txt .
          zip TrickyTowersPatch.zip TrickyTowersPatch.dmg INSTALL.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrickyTowersPatch-macOS
          path: TrickyTowersPatch.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            TrickyTowersPatch.dmg
            TrickyTowersPatch.zip
          generate_release_notes: true
